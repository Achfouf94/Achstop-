name: 🚀 Build FastStop IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FastStop_V4.ipa Payload/

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastStop-V4-IPA
          path: FastStop_V4.ipa
          retention-days: 30
